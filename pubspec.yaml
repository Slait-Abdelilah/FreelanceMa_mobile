name: freelancema_mobile
description: "FreelanceMa - Plateforme freelance du Maroc"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.1

  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # WebSocket / STOMP
  stomp_dart_client: ^3.0.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
